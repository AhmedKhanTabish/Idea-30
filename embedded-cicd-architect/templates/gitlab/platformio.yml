# =============================================================================
# GitLab CI — PlatformIO Pipeline
# =============================================================================
# Generated by Embedded CI/CD Pipeline Architect

stages:
  - lint
  - build
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

.pio_base:
  image: python:3.11-slim
  before_script:
    - pip install platformio
  cache:
    key: pio-${CI_COMMIT_REF_SLUG}
    paths:
      - .pip-cache/
      - .platformio/

lint:
  stage: lint
  image: ubuntu:latest
  before_script:
    - apt-get update && apt-get install -y cppcheck
  script:
    - cppcheck --enable=warning,performance,portability --suppress=missingIncludeSystem src/ include/ lib/ || true

{{#each environments}}
build:{{this}}:
  extends: .pio_base
  stage: build
  needs: [lint]
  script:
    - pio run -e {{this}}
  artifacts:
    paths:
      - .pio/build/{{this}}/firmware.*
      - .pio/build/{{this}}/*.bin
    expire_in: 30 days

{{/each}}
test:
  extends: .pio_base
  stage: test
  script:
    - pio test --without-uploading || echo "No tests found"
