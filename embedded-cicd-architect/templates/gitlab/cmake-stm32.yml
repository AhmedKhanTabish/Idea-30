# =============================================================================
# GitLab CI — CMake STM32 Pipeline
# =============================================================================
# Generated by Embedded CI/CD Pipeline Architect

stages:
  - lint
  - build
  - test

lint:
  stage: lint
  image: ubuntu:latest
  before_script:
    - apt-get update && apt-get install -y cppcheck
  script:
    - cppcheck --enable=warning,performance,portability --suppress=missingIncludeSystem src/ || true

build:
  stage: build
  image: gcc-arm-none-eabi:latest
  needs: [lint]
  script:
    - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE={{toolchainFile}}
    - cmake --build build --parallel
    - arm-none-eabi-size build/*.elf || true
  artifacts:
    paths:
      - build/*.elf
      - build/*.bin
      - build/*.hex
    expire_in: 30 days

test:
  stage: test
  image: ubuntu:latest
  needs: [build]
  script:
    - echo "⚠️  Add unit tests to enable this stage"
