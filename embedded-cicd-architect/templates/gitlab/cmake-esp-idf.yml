# =============================================================================
# GitLab CI — ESP-IDF Pipeline
# =============================================================================
# Generated by Embedded CI/CD Pipeline Architect

stages:
  - build
  - test

build:
  stage: build
  image: espressif/idf:v5.3
  script:
    - . $IDF_PATH/export.sh
    - idf.py set-target {{board}}
    - idf.py build
    - idf.py size
  artifacts:
    paths:
      - build/*.bin
      - build/bootloader/*.bin
      - build/partition_table/*.bin
    expire_in: 30 days

test:
  stage: test
  needs: [build]
  script:
    - echo "⚠️  Add unit tests to enable this stage"
