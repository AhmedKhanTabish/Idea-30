# =============================================================================
# GitHub Actions — PlatformIO CI/CD Pipeline
# =============================================================================
# Generated by Embedded CI/CD Pipeline Architect
#
# WHAT THIS DOES:
# 1. Triggers on every push and pull request
# 2. Sets up Python + PlatformIO CLI
# 3. Caches PlatformIO toolchains (saves ~2min per run)
# 4. Runs linting with cppcheck
# 5. Builds ALL environments from platformio.ini in parallel (matrix build)
# 6. Runs unit tests (if test/ directory exists)
# 7. Uploads compiled firmware as downloadable artifacts

name: PlatformIO CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ---------------------------------------------------------------------------
  # LINT — Static analysis catches bugs before compilation
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability \
                   --suppress=missingIncludeSystem \
                   --error-exitcode=1 \
                   src/ include/ lib/ 2>&1 || true
        # NOTE: We use `|| true` so lint warnings don't block the build.
        # Remove `|| true` once your code passes all checks.

  # ---------------------------------------------------------------------------
  # BUILD — Cross-compile for each environment in platformio.ini
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        environment: [{{environments}}]
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            ~/.platformio/packages
          key: ${{ runner.os }}-pio-${{ matrix.environment }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ matrix.environment }}-
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware (${{ matrix.environment }})
        run: pio run -e ${{ matrix.environment }}

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.environment }}
          path: |
            .pio/build/${{ matrix.environment }}/firmware.*
            .pio/build/${{ matrix.environment }}/*.bin
          retention-days: 30

  # ---------------------------------------------------------------------------
  # TEST — Run unit tests (if test/ directory exists)
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: build
    if: hashFiles('test/**') != ''
    strategy:
      matrix:
        environment: [{{environments}}]
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
            ~/.platformio/packages
          key: ${{ runner.os }}-pio-test-${{ matrix.environment }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run unit tests
        run: pio test -e ${{ matrix.environment }} --without-uploading
