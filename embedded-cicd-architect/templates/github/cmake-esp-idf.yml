# =============================================================================
# GitHub Actions — ESP-IDF CI/CD Pipeline
# =============================================================================
# Generated by Embedded CI/CD Pipeline Architect
#
# Uses the official Espressif Docker image for consistent builds.

name: ESP-IDF CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build with ESP-IDF
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target {{board}}
          idf.py build

      - name: Show binary size
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py size

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-{{board}}
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
            build/flasher_args.json
          retention-days: 30

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Host-side tests
        run: |
          # TODO: Add pytest or Unity host tests
          echo "⚠️  Add unit tests to enable this stage"
