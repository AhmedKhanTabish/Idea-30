# =============================================================================
# GitHub Actions — CMake STM32 CI/CD Pipeline
# =============================================================================
# Generated by Embedded CI/CD Pipeline Architect
#
# WHAT THIS DOES:
# 1. Sets up ARM GCC cross-compiler toolchain
# 2. Runs static analysis with cppcheck
# 3. Builds the firmware using CMake + Make
# 4. Uploads compiled .elf/.bin/.hex artifacts

name: STM32 CMake CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      - name: Run static analysis
        run: |
          cppcheck --enable=warning,performance,portability \
                   --suppress=missingIncludeSystem \
                   --error-exitcode=1 \
                   src/ 2>&1 || true

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM GCC toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -B build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_TOOLCHAIN_FILE={{toolchainFile}}

      - name: Build firmware
        run: cmake --build build --parallel

      - name: Show binary size
        run: arm-none-eabi-size build/*.elf || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-stm32
          path: |
            build/*.elf
            build/*.bin
            build/*.hex
          retention-days: 30

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install test dependencies
        run: sudo apt-get install -y cmake build-essential
      - name: Build and run host tests
        run: |
          # TODO: Configure host-side unit tests
          # cmake -B build-test -DBUILD_TESTING=ON
          # cmake --build build-test
          # ctest --test-dir build-test --output-on-failure
          echo "⚠️  Add unit tests to enable this stage"
